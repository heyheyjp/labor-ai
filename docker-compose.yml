name: labor-ai

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: labor_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labor_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labor_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
